name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to push back to main
          fetch-depth: 0
          ref: main

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archives
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          build() {
            local os=$1 arch=$2
            local ext=""
            [ "$os" = "windows" ] && ext=".exe"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
              -o dist/knoter-${os}-${arch}${ext} ./cmd/knoter
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
              -o dist/knoter-auth-${os}-${arch}${ext} ./cmd/knoter-auth
          }

          build darwin  amd64
          build darwin  arm64
          build linux   amd64
          build linux   arm64
          build windows amd64
          build windows arm64

          cd dist
          for pair in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            os=${pair%/*}; arch=${pair#*/}
            cp knoter-${os}-${arch}       knoter
            cp knoter-auth-${os}-${arch}  knoter-auth
            tar czf knoter-${os}-${arch}.tar.gz knoter knoter-auth
            rm knoter knoter-auth
          done
          for arch in amd64 arm64; do
            cp knoter-windows-${arch}.exe       knoter.exe
            cp knoter-auth-windows-${arch}.exe  knoter-auth.exe
            zip knoter-windows-${arch}.zip knoter.exe knoter-auth.exe
            rm knoter.exe knoter-auth.exe
          done
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NUM="${VERSION#v}"
          TARBALL_URL="https://github.com/hirenj/go-knoter/archive/refs/tags/${VERSION}.tar.gz"

          # GitHub generates the tag tarball; download it to get the sha256
          SHA=$(curl -sL "$TARBALL_URL" | sha256sum | awk '{print $1}')

          sed -i \
            -e "s|url \"https://github.com/hirenj/go-knoter/archive/refs/tags/.*\"|url \"${TARBALL_URL}\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA}\"|" \
            Formula/knoter.rb

      - name: Commit updated formula
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/knoter.rb
          git commit -m "brew: update formula to ${GITHUB_REF_NAME}"
          git push origin main

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
